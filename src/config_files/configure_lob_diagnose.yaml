# Diagnostic config for the temporal-prior-collapse hypothesis sweep.
# The 20k-step run on configure_lob.yaml ended with Imagine/mid_norm_std=0.0,
# indicating the prior emits a constant midprice across a 32-step rollout.
# Three levers below isolate the suspected causes (H1, H2, H3 in the plan).
# Run a 1000-step probe with one lever flipped at a time and inspect
# Imagine/mid_norm_std on each.
#
# Defaults preserved from configure_lob.yaml. Only the three lever keys differ.

BasicSettings:
  ObsMode: features
  FeatureDim: 94
  ReplayBufferOnGPU: True
  Seed: 3710
  Env_name: LOB
  Device: cuda:0
  Use_amp: True
  NormClip: 8.0
  Use_cg: False
  Compile: False
  SavePath: None

Evaluate:
  EpisodeNum: 10
  NumEnvs: 1
  DuringTraining: False
  EverySteps: 1000

JointTrainAgent:
  SampleMaxSteps: 1000        # Short probe; lift to 20000 once a lever is selected.
  BufferMaxLength: 50000
  WorldModelWarmUp: 64
  BehaviourWarmUp: 1000000
  NumEnvs: 1
  BatchSize: 64
  AccumSteps: 2
  BatchLength: 64
  ImagineBatchSize: 64
  ImagineContextLength: 8
  ImagineBatchLength: 16
  RealityContextLength: 16
  TrainDynamicsEverySteps: 1
  TrainDynamicsEpoch: 1
  TrainAgentEverySteps: 1
  FreezeWorldModelAfterSteps: 20000
  FreezeBehaviourAfterSteps: 0
  SaveEverySteps: 200          # Save more often during the short probe.
  SaveModels: True
  Tau: 10
  ImaginationTau: 10
  Alpha: 1.0
  Beta: 1.0

Models:
  WorldModel:
    dtype: float32
    Backbone: Mamba3
    Act: SiLU
    CategoricalDim: 16
    ClassDim: 16
    HiddenStateDim: 512
    Optimiser: Laprop
    LatentDiscreteType: naive
    Max_grad_norm: 1000
    Warmup_steps: 100          # Shorter warmup for a 1000-step probe.
    LRSchedule: cosine
    LRMinRatio: 0.1
    UseActionInput: True
    DirectionThresholds: null
    Dropout: 0.1
    Unimix_ratio: 0.01
    Weight_decay: 1.0e-4
    # H1 lever. DreamerV3 uses 0.5; the original Drama default is 0.1. The collapse
    # hypothesis says 0.1 lets dynamics dominate and the prior copies the posterior trivially.
    RepresentationLossWeight: 0.5
    # H2 lever. The 1.0 default clips KL at 1 nat per timestep, which on a 16x16 categorical
    # may starve the dynamics signal. Drop to 0.0 to remove the floor entirely.
    FreeBits: 0.0
    Adam:
      LearningRate: 1.0e-4
    Laprop:
      LearningRate: 4.0e-5
      Epsilon: 1.0e-20
    Encoder:
      Type: lob
      K: 10
      FeatureDimLevel: 8
      FeatureDimTick: 14
      DModel: 128
      NumLayers: 2
      NumHeads: 4
      DimFeedforward: 256
      OutputFlattenDim: 1024
      AggregateOnly: False
      GradientCheckpointing: False
    Decoder:
      Kind: mse
      HiddenDim: 512
      NumLayers: 3
      NuInit: 5.0
      LearnableNu: True
      # H3 lever. The 2.0 default up-weights size and depth feature MSE; the 20k-step run
      # saw log_cum_depth absorb 30 of 293 val_loss units while mid stayed unmodelled.
      # Setting 1.0 levels the playing field and forces the decoder to spread capacity.
      SizeWeight: 1.0
    Reward:
      Enabled: false
      HiddenUnits: 256
      LayerNum: 1
    Termination:
      Enabled: false
      HiddenUnits: 256
      LayerNum: 1
    Transformer:
      FinalFeatureWidth: 4
      NumLayers: 2
      NumHeads: 8
    Mamba:
      n_layer: 2
      d_intermediate: 0
      ssm_cfg:
        d_state: 16
    Mamba3:
      Enabled: true
      n_layer: 4
      is_mimo: true
      mimo_rank: 4
      d_state: 128
      headdim: 64
      chunk_size: 16
      is_outproj_norm: false
      rope_fraction: 0.5
    Direction:
      Enabled: True
      NumClasses: 3
      Threshold: 0.01
      LossWeight: 0.5
      Dropout: 0.0
    Regime:
      Enabled: False
      NumRegimes: 8
      EmbedDim: 32
    EpisodicMemory:
      Enabled: False
      Capacity: 50000
      TopK: 4
      MinFillBeforeRetrieve: 1024
      RetrieveEvery: 4
      UseNovelty: False
      NoveltyThreshold: 0.0
    Hawkes:
      Enabled: False
      LossWeight: 0.1
    Settlement:
      Enabled: False
      LossWeight: 0.25

  Agent:
    dtype: float32
    Policy: AC
    Unimix_ratio: 0
    AC:
      NumLayers: 3
      Gamma: 0.985
      Lambda: 0.95
      EntropyCoef: 3.e-4
      Max_grad_norm: 100
      Warmup_steps: 1000
      Act: SiLU
      Optimiser: Laprop
      Adam:
        LearningRate: 3.0e-5
        Epsilon: 1.0e-5
      Laprop:
        LearningRate: 4.0e-5
        Epsilon: 1.0e-20
      Actor:
        HiddenUnits: 256
      Critic:
        HiddenUnits: 512
    PPO:
      NumLayers: 3
      Gamma: 0.985
      Lambda: 0.95
      EpsilonClip: 0.2
      K_epochs: 3
      Minibatch: 16384
      CriticCoef: 1
      EntropyCoef: 3.e-4
      KL_threshold: 0.01
      Max_grad_norm: 100
      Warmup_steps: 1000
      Act: SiLU
      Optimiser: Laprop
      Adam:
        LearningRate: 3.e-5
        Epsilon: 1.0e-5
      Laprop:
        LearningRate: 4.0e-5
        Epsilon: 1.0e-20
      Actor:
        HiddenUnits: 256
      Critic:
        HiddenUnits: 512

Wandb:
  Init:
    Mode: offline
    Project: Drama_LOB_pretrain
n: lob
